<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Python Instant Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --text: #d4d4d4; --accent: #007acc; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #444; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        textarea, #output { flex: 1; background: var(--panel); color: var(--text); border: 1px solid #444; padding: 10px; font-family: 'Consolas', monospace; font-size: 14px; outline: none; }
        #output { color: #4ec9b0; overflow-y: auto; white-space: pre-wrap; }
        button { padding: 8px 20px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .run { background: #28a745; color: white; }
        .clear { background: #666; color: white; }
        #status { font-size: 12px; margin-left: auto; color: #888; }
    </style>
</head>
<body>

<header>
    <button id="runBtn" class="run" onclick="runPython()" disabled>Cargando...</button>
    <button class="clear" onclick="clearAll()">Borrar</button>
    <div id="status">Sincronizando motor...</div>
</header>

<div class="container">
    <div class="panel">
        <textarea id="code"># El motor se guarda en caché para carga instantánea
print("¡Motor cargado!")
import math
print(f"Raíz de 144 es: {math.sqrt(144)}")</textarea>
    </div>
    <div class="panel">
        <div id="output"></div>
    </div>
</div>

<script>
    // Registro del Service Worker para modo Offline/Instantáneo
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => {
                console.log('Motor persistente activado.');
            });
        });
    }

    let py;
    async function init() {
        py = await loadPyodide();
        document.getElementById('runBtn').disabled = false;
        document.getElementById('runBtn').innerText = "Ejecutar";
        document.getElementById('status').innerText = "Motor local listo";
    }
    init();

    async function runPython() {
        const out = document.getElementById("output");
        out.innerText = "Procesando...\n";
        py.setStdout({ batched: (msg) => out.innerText += msg + "\n" });
        try {
            await py.runPythonAsync(document.getElementById("code").value);
        } catch (e) {
            out.innerText += "\nError: " + e;
        }
    }

    function clearAll() {
        document.getElementById("code").value = "";
        document.getElementById("output").innerText = "";
    }
</script>
</body>
</html>

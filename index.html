<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Python Pro Editor</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 12px 20px; background: var(--header); display: flex; gap: 15px; align-items: center; border-bottom: 1px solid var(--border); }
        
        .container { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid var(--border); }
        
        /* Capas del Editor */
        .editor-wrapper { position: relative; flex: 1; background: #1e1e1e; margin: 10px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        #editing, #highlighting { margin: 0; padding: 15px; border: 0; width: 100%; height: 100%; position: absolute; top: 0; left: 0; tab-size: 4; box-sizing: border-box; font-family: 'Fira Code', 'Consolas', monospace; font-size: 14px; line-height: 1.5; white-space: pre; overflow: wrap; }
        
        #editing { z-index: 1; white-space: pre; color: transparent; background: transparent; caret-color: white; resize: none; outline: none; }
        #highlighting { z-index: 0; pointer-events: none; }
        
        #output { flex: 1; background: #050505; color: #7ee787; padding: 15px; margin: 10px; border-radius: 6px; font-family: monospace; overflow-y: auto; white-space: pre-wrap; border: 1px solid var(--border); }

        button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .run { background: #238636; color: white; }
        .run:hover { background: #2ea043; }
        .run:disabled { background: #21472a; color: #888; }
        .clear { background: #30363d; color: #c9d1d9; border: 1px solid #8b949e; }
        
        label { font-size: 11px; font-weight: bold; color: #8b949e; margin: 10px 0 0 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <button id="runBtn" class="run" onclick="runPython()" disabled>Cargando Python...</button>
    <button class="clear" onclick="clearAll()">Limpiar</button>
    <span id="status" style="font-size: 12px; color: #d29922;">Iniciando sistema...</span>
</header>

<div class="container">
    <div class="panel">
        <label>Editor de Código</label>
        <div class="editor-wrapper">
            <textarea id="editing" spellcheck="false" oninput="updateEditor(this.value); syncScroll(this);" onkeydown="handleTabs(event)"></textarea>
            <pre id="highlighting" aria-hidden="true"><code class="language-python" id="highlighting-content"></code></pre>
        </div>
    </div>
    <div class="panel">
        <label>Salida / Consola</label>
        <div id="output"></div>
    </div>
</div>

<script>
    let py;
    const editor = document.getElementById("editing");
    const resultElement = document.getElementById("highlighting-content");
    const outputDiv = document.getElementById("output");

    // Código inicial de ejemplo
    const codeInital = `import math\n\n# Ejemplo: Factorial con input coloreado\nnombre = input("¿Cual es tu nombre?")\nprint(f"Hola {nombre}, calcularemos un factorial.")\n\nnum = int(input("Introduce un número:"))\nprint(f"El resultado es: {math.factorial(num)}")`;

    async function init() {
        py = await loadPyodide();
        // Soporte para input()
        py.runPython(`import builtins, js\ndef custom_input(p=""): return js.prompt(p)\nbuiltins.input = custom_input`);
        
        document.getElementById('runBtn').disabled = false;
        document.getElementById('runBtn').innerText = "Ejecutar (F5)";
        document.getElementById('status').innerText = "Motor Listo";
        document.getElementById('status').style.color = "#39d353";
        
        editor.value = codeInital;
        updateEditor(codeInital);
    }

    function updateEditor(text) {
        // Prism requiere que las entidades HTML estén escapadas
        let content = text.replace(/&/g, "&amp;").replace(/</g, "&lt;");
        if(content[content.length-1] == "\n") content += " "; 
        resultElement.innerHTML = content;
        Prism.highlightElement(resultElement);
    }

    function syncScroll(el) {
        document.getElementById("highlighting").scrollTop = el.scrollTop;
    }

    function handleTabs(e) {
        if (e.key == 'Tab') {
            e.preventDefault();
            let start = editor.selectionStart;
            let end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + 4;
            updateEditor(editor.value);
        }
    }

    async function runPython() {
        outputDiv.innerText = ">>> Ejecutando...\n";
        py.setStdout({ batched: (msg) => outputDiv.innerText += msg + "\n" });
        try {
            await py.runPythonAsync(editor.value);
        } catch (err) {
            outputDiv.innerText += "\n[ERROR]: " + err;
        }
    }

    function clearAll() {
        editor.value = "";
        updateEditor("");
        outputDiv.innerText = "";
    }

    init();
</script>
</body>
</html>

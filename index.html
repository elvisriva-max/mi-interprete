<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intérprete Python 3 Profesional</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; }
        header { padding: 10px 20px; background: #333; display: flex; justify-content: space-between; align-items: center; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #editor-container { flex: 1; border-right: 1px solid #444; }
        #output-container { width: 40%; background: #000; padding: 15px; overflow-y: auto; font-family: 'Consolas', monospace; color: #d4d4d4; }
        button { background: #0078d4; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #005a9e; }
        button:disabled { background: #555; cursor: wait; }
        .status { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<header>
    <div><strong>Python Online Interpreter</strong> <span id="loading-status" class="status">(Cargando Python...)</span></div>
    <button id="run-btn" disabled onclick="runCode()">Ejecutar Código</button>
</header>

<div id="main">
    <div id="editor-container"></div>
    <div id="output-container">
        <div style="color: #569cd6;">> Consola de Salida:</div>
        <pre id="output"></pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let editor;
    let pyodide;

    // 1. Configurar Monaco Editor
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: [
                '# Bienvenido a tu intérprete de Python\n',
                'def saludar(nombre):\n    return f"Hola {nombre}, bienvenido a la programación competitiva!"\n',
                'print(saludar("Estudiante"))\n',
                '# Prueba un bucle\nfor i in range(5):\n    print(f"Número: {i}")'
            ].join('\n'),
            language: 'python',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 16
        });
    });

    // 2. Inicializar Pyodide
    async function initPyodide() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('loading-status').innerText = "(Python Listo)";
            document.getElementById('run-btn').disabled = false;
        } catch (e) {
            document.getElementById('loading-status').innerText = "(Error al cargar)";
        }
    }
    initPyodide();

    // 3. Función para ejecutar el código
    async function runCode() {
        const outputElement = document.getElementById('output');
        const code = editor.getValue();
        outputElement.innerText = "Ejecutando...\n";

        try {
            // Capturamos el stdout (print) para que salga en nuestro panel
            await pyodide.runPythonAsync(`
                import sys
                import io
                sys.stdout = io.StringIO()
            `);

            await pyodide.runPythonAsync(code);
            
            const stdout = pyodide.runPython("sys.stdout.getvalue()");
            outputElement.innerText = stdout || "Código ejecutado (sin salida).";
        } catch (err) {
            outputElement.innerText = "Error:\n" + err;
        }
    }
</script>

</body>
</html>

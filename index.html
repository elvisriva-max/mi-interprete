<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Web IDE</title>
    <link rel="stylesheet" href="https://unpkg.com/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; font-family: sans-serif; }
        header { padding: 10px 20px; background: #2d2d2d; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #editor-container { flex: 1; }
        #output-container { width: 35%; background: #000; display: flex; flex-direction: column; border-left: 1px solid #444; }
        .output-header { padding: 8px 15px; background: #252526; font-size: 12px; color: #569cd6; border-bottom: 1px solid #333; }
        #output { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Consolas', monospace; color: #d4d4d4; margin: 0; white-space: pre-wrap; font-size: 14px; }
        button { background: #0078d4; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #555; cursor: wait; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: #444; }
    </style>
</head>
<body>

<header>
    <div><strong>Python IDE</strong> <span id="status" class="badge">⏳ Cargando...</span></div>
    <button id="run-btn" disabled onclick="runCode()">Ejecutar</button>
</header>

<div id="main">
    <div id="editor-container"></div>
    <div id="output-container">
        <div class="output-header">CONSOLA</div>
        <pre id="output">Cargando componentes...</pre>
    </div>
</div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let editor;
    let pyodide;

    // Configuración específica para servidores web (GitHub Pages)
    require.config({ 
        paths: { 'vs': 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } 
    });

    // Forzamos la carga de los módulos
    window.MonacoEnvironment = { getWorkerUrl: () => proxy };
    let proxy = URL.createObjectURL(new Blob([`
        self.MonacoEnvironment = { baseUrl: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' };
        importScripts('https://unpkg.com/monaco-editor@0.45.0/min/vs/base/worker/workerMain.js');
    `], { type: 'text/javascript' }));

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: "print('¡Hola desde Python!')\n# Escribe tu código aquí",
            language: 'python',
            theme: 'vs-dark',
            automaticLayout: true
        });
    });

    async function init() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('status').innerText = "✅ Listo";
            document.getElementById('output').innerText = "Entorno preparado.";
            document.getElementById('run-btn').disabled = false;
        } catch (e) {
            document.getElementById('output').innerText = "Error cargando Python: " + e;
        }
    }
    init();

    async function runCode() {
        const out = document.getElementById('output');
        out.innerText = "Ejecutando...";
        try {
            await pyodide.runPythonAsync(`
                import sys, io
                sys.stdout = io.StringIO()
            `);
            await pyodide.runPythonAsync(editor.getValue());
            out.innerText = pyodide.runPython("sys.stdout.getvalue()") || "Ejecutado (sin salida)";
        } catch (err) {
            out.innerText = "Error:\n" + err;
        }
    }
</script>
</body>
</html>
